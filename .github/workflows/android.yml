name: Build Android APK

# Builds an installable (sideloadable) debug APK and uploads it as a downloadable
# artifact. No Play Store, no signing setup needed — grab it from the run's
# "Artifacts" section and install it on the phone.
on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages (API 36)
        run: yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Sync web build into the Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: imposter-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
