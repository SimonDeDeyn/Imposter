<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1A31"/>
      <stop offset="1" stop-color="#14121F"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background layer for the adaptive icon: same gradient + soft
       purple glow as the web icon, with the glow centered behind the foreground
       mask (foreground places the mask at ~512,478 at 66% scale) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="473" r="200" fill="#B78CFF" opacity="0.14"/>
</svg>
